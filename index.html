<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal Smart Routine & Product Advisor</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <img src="img/loreal-logo.png" class="brand-logo" />
        <h1 class="site-title">Smart Routine & Product Advisor</h1>
        <p class="site-subtitle">
          Ask about skincare, makeup, haircare, fragrance, and personalized routines.
        </p>
      </header>

      <section class="chatbox">
        <div class="latest-question-card">
          <p class="latest-question-label">Latest Question</p>
          <p id="latestQuestion">Ask me anything beauty-related...</p>
        </div>

        <div id="chatWindow" class="chat-window">
          <div class="message-row ai">
            <div class="message-bubble ai-bubble">
              Hi! I’m your L’Oréal beauty advisor. Ask me anything about skincare, haircare, or routines.
            </div>
          </div>
        </div>

        <form id="chatForm" class="chat-form">
          <input id="userInput" type="text" placeholder="Ask something..." required />
          <button type="submit">
            <span class="material-icons">send</span>
          </button>
        </form>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
